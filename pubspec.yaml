name: guardian_child
description: GuardIan Child - Stay safe, stay connected
publish_to: 'none'
version: 1.0.2+6

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Navigation
  go_router: ^14.2.7

  # State
  provider: ^6.1.2

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Device / platform
  shared_preferences: ^2.3.2
  package_info_plus: ^8.1.1
  device_info_plus: ^10.1.2
  permission_handler: ^11.3.1
  battery_plus: ^6.0.3

  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
