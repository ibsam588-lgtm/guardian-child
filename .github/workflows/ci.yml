name: GuardIan Child CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  #  1. Analyze & Test
  # ─────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: false

      - name: Cache Flutter SDK
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.pub-cache
            /opt/hostedtoolcache/flutter
          key: flutter-3.27.0-${{ runner.os }}
          restore-keys: flutter-3.27.0-

      - name: Create secrets stub
        run: |
          mkdir -p lib
          cat > lib/secrets.dart << 'DART'
          const String revenueCatKey = '';
          const String mapsApiKey = '';
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

  # ─────────────────────────────────────────────
  #  2. Build & Deploy Android
  # ─────────────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: false

      - name: Cache Flutter SDK
        uses: actions/cache@v5.0.3
        with:
          path: |
            ~/.pub-cache
            /opt/hostedtoolcache/flutter
          key: flutter-3.27.0-${{ runner.os }}
          restore-keys: flutter-3.27.0-

      - name: Create secrets stub
        run: |
          mkdir -p lib
          cat > lib/secrets.dart << 'DART'
          const String revenueCatKey = '';
          const String mapsApiKey = '';
          DART

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=keystore.jks\n" \
              "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
            echo "Keystore configured"
          else
            echo "No keystore secret – using debug signing"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build App Bundle
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7.0.0
        continue-on-error: true
        with:
          name: guardian-child-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Deploy to Play Store internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.guardian.child
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
